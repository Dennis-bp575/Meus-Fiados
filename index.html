    function getMesReferencia(offset) {
      const d = new Date();
      d.setMonth(d.getMonth() + offset);
      const meses = ["JANEIRO","FEVEREIRO","MARÇO","ABRIL","MAIO","JUNHO","JULHO","AGOSTO","SETEMBRO","OUTUBRO","NOVEMBRO","DEZEMBRO"];
      return `${meses[d.getMonth()]} ${d.getFullYear()}`;
    }

    function mudarAba(index) {
      abaAtual = index;
      document.querySelectorAll('[id^="tab"]').forEach(el =>
        el.classList.remove('aba-ativa','text-slate-900'));
      document.getElementById('tab' + index).classList.add('aba-ativa');
      renderizar();
    }

		container.innerHTML = "";
		let total = 0;

		const gastosFiltrados = gastos.filter(g => g.mesRef === mesNome);

					<!-- A Seta só aparece se houver mais de 1 detalhe cadastrado -->

						               shadow-sm

						  ▼

					<button onclick="excluirItem(${item.id})"
						  class="w-5 h-5 flex items-center justify-center
						         rounded-full
						         border border-slate-300
						         text-slate-500
						         text-xs font-bold
						         bg-red-500
						         text-white

			${item.detalhes ? item.detalhes.map(d => `

  async function incluirPorTexto(texto) {

	  const resultado = extrairNomeValor(texto);
	  
	  if (!resultado.valor) return alert("Diga o valor claramente.");
	
		const nome = resultado.nome
	  	let valor;
	  	valor = resultado.valor
		const valorNumericoI = parseFloat(valor);
		const valorFormatadoI = isNaN(valorNumericoI) 
		  ? 'R$ 0,00' 
		  : valorNumericoI.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
		
		const tudoCerto = await mostrarConfirmacaoCustomizada(nome, valorFormatadoI);
	  
		if (tudoCerto) {
			  const mesRefAtual = getMesReferencia(abaAtual);
			  const indexExistente = gastos.findIndex(g => 
			    g.nome.toLowerCase() === nome.toLowerCase() && 
			    g.mesRef === mesRefAtual
			  );
		
			  let valorFinal = valor;
			  
			if (indexExistente !== -1) {
			
				gastos[indexExistente].valor += valor;
			
				if (!gastos[indexExistente].detalhes) {
				
				    gastos[indexExistente].detalhes = [{
				        idLancamento: gastos[indexExistente].id,
				        valor: gastos[indexExistente].valor,
				        dia: gastos[indexExistente].dia
				    }];
				
				}

				gastos[indexExistente].detalhes.push({
					idLancamento: Date.now(),
					valor: valor,
					dia: new Date().getDate()
				});
			
			} else {

		
				  gastos.unshift({
					  id: Date.now(),
					  nome: nome,
					  valor: valor, // Seu valor total inicial
					  dia: new Date().getDate(),
					  mesRef: mesRefAtual,
			  
					  // Aqui entra a sua nova sublista "detalhes"
					  detalhes: [
					    { 
					      idLancamento: Date.now(), 
					      valor: valor,          // Usa a mesma variável do valor acima
					      dia: new Date().getDate()  // Usa o mesmo dia do gasto principal
					    }
					  ]
					});
				}
		  	renderizar();
		}
	}

    function iniciarMicrofone() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) return alert("Navegador incompatível.");
      const r = new SR();
      r.lang = "pt-BR";
      r.onresult = e => incluirPorTexto(e.results[0][0].transcript);
      r.start();
    }

	async function excluirItem(id) {
		  // 1. Busca o item correto no seu array de gastos para pegar o Nome e o Valor antes de apagar
		  const itemParaExcluir = gastos.find(i => i.id === id);
		  
		  // Se por algum motivo não achar o item, interrompe para não dar erro
		  if (!itemParaExcluir) return;
		
		  const nomeCliente = itemParaExcluir.nome || itemParaExcluir.categoria || "Cliente";
		  const valorCliente = itemParaExcluir.valor;
		
		  // 2. Formata o valor para ficar bonito no padrão R$ XX,XX
		  const valorFormatado = valorCliente.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
		
		  // 3. Abre o modal customizado e aguarda a resposta do dono do bar
		  const confirmou = await mostrarConfirmacaoCustomizada(
		    nomeCliente, 
		    valorFormatado, 
		    "⚠️ CONFIRMAR PAGAMENTO TOTAL?"
		  );
		
		  // 4. Se ele clicou em "Confirmar", roda a sua lógica antiga de filtro e limpa a tela
		  if (confirmou) {
		    gastos = gastos.filter(i => i.id !== id);
		    renderizar();
		  }
	}
	  
	function extrairNomeValor(frase) {
	    // 1. Limpa a frase (remove palavras e o "R$")
	    const limpa = frase.replace(/\b(reais|centavos|e)\b|r\s?\$/gi, '').trim();
	
	    // 2. Extrai os números DA FRASE LIMPA
	    const numeros = limpa.match(/\d+/g);
	    
	    let reais = 0;
	    let centavos = 0;
	    if (numeros) {
	        reais = parseInt(numeros[0], 10);
	        centavos = numeros.length > 1 ? parseInt(numeros[1], 10) : 0;
	    }
	
	    // 3. Extrai o nome DA FRASE LIMPA (e não da original!)
	    const matchNome = limpa.match(/^([^\d]*)/);
	    const nome = matchNome ? matchNome[0].trim().replace(/,/g, '') : '';
	
	    const valor = reais + centavos / 100;
	    return { nome, valor };
	}

    function editarValor(id) {
	      const novo = prompt("Novo valor:");
	      if (novo) {
		        gastos = gastos.map(i =>
		          i.id === id ? {...i, valor: parseFloat(novo.replace(",",".")) || 0} : i
		        );
		        renderizar();
	      }
    }

	function mostrarConfirmacaoCustomizada(nome, valorFormatado, titulo = "Meus Fiados diz:") {

		    const txtValor = document.getElementById('modalValor');
		    const btnConfirmar = document.getElementById('btnModalConfirmar');
		    const btnCancelar = document.getElementById('btnModalCancelar');
		
		    // Injeta os dados dinamicamente
		    txtTitulo.textContent = titulo;
		    txtNome.textContent = nome;
		    txtValor.textContent = valorFormatado;
		
		    modal.classList.remove('hidden');
		
		    btnConfirmar.onclick = () => {
		      modal.classList.add('hidden');
		      resolve(true);
		    };
		
		    btnCancelar.onclick = () => {
		      modal.classList.add('hidden');
		      resolve(false);
		    };
		  });
	}
	// Função para gerar um ID aleatório simples (Ex: FIADO-12345-67890)
	function gerarIdAleatorio() {
		const num1 = Math.floor(10000 + Math.random() * 90000);
		const num2 = Math.floor(10000 + Math.random() * 90000);
		return `FIADO-${num1}-${num2}`;
	}

	async function sincronizarComANuvem() {
	    const idUsuario = localStorage.getItem('meu_id_servidor');
	    if (!idUsuario) return;
	
	    // Atualiza a linha do Seu Zé com o pacote de gastos atualizado
	    const { error } = await supabaseClient
	        .from('historico_fiado')
	        .update({ dados: gastos })
	        .eq('user_id', idUsuario);
	
	    if (error) {
	        console.error("Erro ao sincronizar:", error.message);
	    }
	}

	// Função auxiliar para gerar 3 caracteres aleatórios (letras maiúsculas e números)
	function gerarSufixoSecreto() {
	    const caracteres = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // Removi o 'O', 'I', '1' e '0' para o Seu Zé não confundir no papel
	    let resultado = "";
	    for (let i = 0; i < 3; i++) {
	        resultado += caracteres.charAt(Math.floor(Math.random() * caracteres.length));
	    }
	    return resultado;
	}

	function configurarBotoesModal() {
	    // AÇÃO 1: CRIAR NOVO BANCO
	    document.getElementById('btn-criar-banco').onclick = async () => {
	        // Gera o ID administrativo completo com os 3 caracteres aleatórios
	        let idBase = gerarIdAleatorio(); // Função FIADO-XXXXX-XXXXX
	        let sufixo = gerarSufixoSecreto(); // Função D5X
	        let chaveCompletaADM = `${idBase}-${sufixo}`; // adm-XXXXX-XXXXX-D5X (nós podemos adicionar o 'adm-' no começo na hora de salvar)
	        
	        let chaveFinal = `adm-${chaveCompletaADM}`;
	
	        // Cria a estrutura do JSON zerada, já injetando a senha de 3 dígitos lá dentro
	        let estruturaInicial = {
	            senha_adm: sufixo,
	            clientes_e_fiados: []
	        };
	
	        // Salva a linha virgem lá no Supabase usando o ID Base como user_id
	        await supabaseClient.from('historico_fiado').insert({ 
	            user_id: idBase, 
	            dados: estruturaInicial 
	        });
	
	        // Grava no LocalStorage do aparelho do Seu Zé
	        localStorage.setItem('meu_id_servidor', chaveFinal);
	
	        // Fecha o modal escondendo ele novamente
	        document.getElementById('modal-inicial').classList.add('hidden');
	
	        // Mostra um novo alerta/popup forçando o Seu Zé a ver a chave dele
	        alert(`IMPORTANTE, Seu Zé!\nSua chave de recuperação é:\n\n${chaveFinal}\n\nAnotou? Clique em OK para começar.`);
	
	        // Alimenta a variável global e desenha a tela bonita vazia igual ao seu print!
	        gastos = [];
	        renderizar();
	    };
	
	    // AÇÃO 2: MOSTRAR CAMPO DE RECUPERAÇÃO
	    document.getElementById('btn-abrir-recuperar').onclick = () => {
	        // Revela a caixinha de texto oculta para ele digitar a chave antiga
	        document.getElementById('campo-recuperacao').classList.remove('hidden');
	    };
	
	    // AÇÃO 3: CONFIRMAR RECUPERAÇÃO E PUXAR DADOS DA NUVEM
	    document.getElementById('btn-confirmar-recuperar').onclick = async () => {
	        let chaveDigitada = document.getElementById('input-chave-antiga').value.trim().toLowerCase();
	
	        if (!chaveDigitada) {
	            alert("Digite a sua chave para continuar!");
	            return;
	        }
	
	        // Salva a chave digitada no LocalStorage do celular novo
	        localStorage.setItem('meu_id_servidor', chaveDigitada);
	        
	        // Esconde o modal e força o app a recarregar buscando as informações da internet
	        document.getElementById('modal-inicial').classList.add('hidden');
	        
	        // Reinicia o app, que agora vai achar a chave no LocalStorage e rodar o fluxo de baixar os dados!
	        iniciarAplicativo(); 
	    };
	}

	async function buscarDadosDaNuvemHTTP(idBanco) {
	    const url = `${SUPABASE_URL}/rest/v1/historico_fiado?user_id=eq.${idBanco}&select=dados`;
	
	    const resposta = await fetch(url, {
	        method: "GET",
	        headers: {
	            "apikey": SUPABASE_KEY,
	            "Authorization": `Bearer ${SUPABASE_KEY}`
	        }
	    });
	
	    if (!resposta.ok) {
	        console.error("Erro ao buscar dados na nuvem");
	        return null;
	    }
	
	    const dadosRecebidos = await resposta.json();
	    
	    // Como o select retorna uma lista, pegamos o primeiro item se existir
	    return dadosRecebidos.length > 0 ? dadosRecebidos[0].dados : null;
	}

	async function salvarDadosNaNuvemHTTP(idBanco, pacoteDados) {
	    const url = `${SUPABASE_URL}/rest/v1/historico_fiado`;
	
	    const resposta = await fetch(url, {
	        method: "POST",
	        headers: {
	            "apikey": SUPABASE_KEY,
	            "Authorization": `Bearer ${SUPABASE_KEY}`,
	            "Content-Type": "application/json",
	            "Prefer": "resolution=merge-duplicates" // Diz para atualizar se o user_id já existir
	        },
	        body: JSON.stringify({
	            user_id: idBanco,
	            dados: pacoteDados
	        })
	    });
	
	    if (!resposta.ok) {
	        console.error("Erro ao salvar dados na nuvem");
	    } else {
	        console.log("Sincronizado com sucesso via HTTP!");
	    }
	}

	  

	window.addEventListener('DOMContentLoaded', () => {
	    console.log("Todos os scripts carregados! Iniciando o motor do Seu Zé.");
	    iniciarAplicativo();
	});

    // renderizar();
  </script>
